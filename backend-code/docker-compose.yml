version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: brokeria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: brokeria_user
      POSTGRES_PASSWORD: BrokerIA_SecurePass2026
      POSTGRES_DB: brokeria
    ports:
      - "5432:5432"
    volumes:
      - brokeria_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brokeria_user -d brokeria"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: brokeria-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  brokeria_pg_data:
