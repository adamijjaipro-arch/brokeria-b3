services:
  postgres-test:
    image: postgres:15-alpine
    container_name: brokeria-postgres-test
    environment:
      POSTGRES_USER: brokeria_test
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: brokeria_test
    ports:
      - "5433:5432"
    tmpfs:
      # Pas de volume persistant : base jetable, on repart de zéro à chaque run.
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brokeria_test -d brokeria_test"]
      interval: 3s
      timeout: 3s
      retries: 15

  redis-test:
    image: redis:7-alpine
    container_name: brokeria-redis-test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 15
