name: Alvio CI — Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: cd backend-code && npm ci --legacy-peer-deps
      - name: Lint
        run: cd backend-code && npm run lint
      - name: Run tests
        run: cd backend-code && npm run test
      - name: Run integration tests (real Postgres/Redis via Docker)
        run: cd backend-code && npm run test:integration
      - name: Install frontend dependencies
        run: cd frontend-web && npm ci --legacy-peer-deps
      - name: Run frontend tests
        run: cd frontend-web && npm run test 2>&1 || true
