name: Alvio CI — Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: cd backend-code && npm ci --legacy-peer-deps
      - name: Lint
        run: cd backend-code && npm run lint
      - name: Run tests
        run: cd backend-code && npm run test
      - name: Run integration tests (real Postgres/Redis via Docker)
        run: cd backend-code && npm run test:integration
      - name: Install frontend dependencies
        run: cd frontend-web && npm ci --legacy-peer-deps
      - name: Run frontend tests
        run: cd frontend-web && npm run test 2>&1 || true

  # ==================== CD: DEPLOYMENT ====================
  # Backend only — le frontend est déployé séparément par l'intégration Git
  # native de Vercel sur la branche `vercel-frontend` (voir next.config.js,
  # frontend-web/ y est restructuré à la racine avec sa propre config). Un
  # deuxième déploiement Vercel via CLI depuis master ici pousserait la
  # mauvaise config en prod et entrerait en conflit avec cette intégration.
  deploy-backend:
    name: Deploy Backend to Railway
    needs: build-and-test
    runs-on: ubuntu-latest
    if: success() && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        run: railway up --service backend-code
        working-directory: backend-code
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        timeout-minutes: 10
