# ─────────────────────────────────────────────────────────────────────────────
# Logstash Pipeline — BrokerIA Security Events
# Input  : Syslog UDP 514 (RFC 5424) depuis le backend NestJS
# Filter : Parse JSON embarqué dans le message syslog
# Output : Elasticsearch + stdout (debug)
# ─────────────────────────────────────────────────────────────────────────────

input {
  udp {
    port  => 514
    codec => plain { charset => "UTF-8" }
    type  => "syslog"
  }
}

filter {
  # ── Extrait le message JSON de la trame RFC 5424 ──────────────────────────
  # Format : <PRI>1 TIMESTAMP HOSTNAME APP PROCID MSGID - {json...}
  grok {
    match => {
      "message" => "<%{NUMBER:syslog_pri}>%{NUMBER:syslog_version} %{TIMESTAMP_ISO8601:syslog_timestamp} %{NOTSPACE:syslog_hostname} %{NOTSPACE:syslog_app} %{NOTSPACE:syslog_procid} %{NOTSPACE:syslog_msgid} %{NOTSPACE:syslog_structured_data} %{GREEDYDATA:json_payload}"
    }
    tag_on_failure => ["_syslog_parse_failure"]
  }

  # ── Parse le payload JSON ─────────────────────────────────────────────────
  if [json_payload] {
    json {
      source => "json_payload"
      target => "event"
      tag_on_failure => ["_json_parse_failure"]
    }
  }

  # ── Promouvoir les champs clés au niveau racine pour les alertes ──────────
  if [event][event_type] {
    mutate {
      add_field => {
        "event_type" => "%{[event][event_type]}"
        "user_id"    => "%{[event][user_id]}"
        "client_ip"  => "%{[event][ip]}"
        "factor"     => "%{[event][factor]}"
        "success"    => "%{[event][success]}"
        "app_name"   => "%{[event][app]}"
        "env"        => "%{[event][env]}"
      }
    }
  }

  # ── Timestamp depuis l'événement applicatif ───────────────────────────────
  if [event][timestamp] {
    date {
      match    => ["[event][timestamp]", "ISO8601"]
      target   => "@timestamp"
    }
  }

  # ── Géolocalisation IP (optionnel — décommenter si MaxMind DB disponible) ─
  # geoip { source => "client_ip" }
}

output {
  # ── Elasticsearch ─────────────────────────────────────────────────────────
  elasticsearch {
    hosts     => ["http://elasticsearch:9200"]
    index     => "brokeria-security-%{+YYYY.MM.dd}"
    # Utiliser ILM en production pour la rotation des indices
  }

  # ── Debug stdout (désactiver en production) ───────────────────────────────
  stdout {
    codec => rubydebug
  }
}
